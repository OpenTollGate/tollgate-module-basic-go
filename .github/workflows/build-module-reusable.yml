# This workflow is reusable for building OpenWrt modules for different architectures
on:
  workflow_call:
    inputs:
      sdk_image:
        required: true
        type: string
      goarch:
        required: true
        type: string
      goarm:
        required: false
        type: string
      gomips:
        required: false
        type: string
      package_name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.sdk_image }}
      options: --user root
    steps:
      - name: Environment Info
        run: |
          echo "Building for SDK image: ${{ inputs.sdk_image }}"
          echo "GOARCH: ${{ inputs.goarch }}"
          echo "GOARM: ${{ inputs.goarm }}"
          echo "GOMIPS: ${{ inputs.gomips }}"

      - uses: actions/checkout@v3
        with:
          path: ${{ inputs.package_name }}/

      - name: Move sources to sdk folder
        run: |
          mv ${{ inputs.package_name }} /builder/package/${{ inputs.package_name }}

      - name: Install Golang
        run: |
          echo "deb https://deb.debian.org/debian bookworm-backports main" > /etc/apt/sources.list.d/backports.list
          apt-get update
          apt-get install -y -t bookworm-backports golang-go

      - name: Configure SDK
        run: |
          cd /builder
          make defconfig
          echo "CONFIG_PACKAGE_${{ inputs.package_name }}=y" >> .config

      - name: Compile Package
        run: |
          cd /builder
          env GOOS=linux \
          GOARCH=${{ inputs.goarch }} \
          GOMIPS=${{ inputs.gomips }} \
          GOARM=${{ inputs.goarm }} \
          make -j$(nproc) V=sc package/${{ inputs.package_name }}/compile

      - name: List output package(s)
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.ipk" -type f | grep -v nodogsplash | head -n1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No .ipk package found in /builder/bin/packages"
            exit 1
          fi
          echo "✅ Found package at: $PACKAGE_PATH"
          FILENAME=$(basename "$PACKAGE_PATH")
          echo "PACKAGE_FILENAME=$FILENAME" >> $GITHUB_ENV
          mkdir -p /github/workspace/artifacts/${{ inputs.goarch }}
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${{ inputs.goarch }}/$FILENAME"

      - name: GitHub Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ inputs.package_name }}-${{ inputs.goarch }}
          path: /github/workspace/artifacts/${{ inputs.goarch }}
          retention-days: 5

      - name: Prepare package metadata
        id: package_info
        run: |
          PACKAGE_PATH=$(find /github/workspace/artifacts/${{ inputs.goarch }} -name "*.ipk" -type f | head -n1)
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> $GITHUB_ENV
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "MODEL=$MODEL" >> $GITHUB_ENV
          echo "PACKAGE_FILENAME=${{ inputs.package_name }}-${MODEL}-${{ inputs.goarch }}.ipk" >> $GITHUB_ENV

      - name: Blossom Artifact upload
        id: blossom_upload
        uses: Origami74/upload-blossom-action@improve-io
        with:
          host: "https://blossom.swissdash.site"
          filePath: ${{ env.PACKAGE_PATH }}

      - name: Process Blossom response and extract hash
        shell: bash
        run: |
          echo "Upload outputs:"
          echo "  URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "  Hash: ${{ steps.blossom_upload.outputs.hash }}"
          echo "  Size: ${{ env.PACKAGE_SIZE }} bytes"
          URL="${{ steps.blossom_upload.outputs.url }}"
          FILENAME=$(basename "$URL")
          HASH="${FILENAME%.ipk}"
          echo "Extracted hash from URL: $HASH"
          echo "PACKAGE_URL=$URL" >> $GITHUB_ENV
          echo "PACKAGE_HASH=$HASH" >> $GITHUB_ENV
          if [ -z "$HASH" ]; then
            echo "❌ ERROR: Failed to extract hash from URL"
            exit 1
          fi
          # Use grep for POSIX-compatible regex check instead of [[ =~ ]]
          if ! echo "$HASH" | grep -qE '^[0-9a-f]{64}$'; then
            echo "❌ ERROR: Extracted hash doesn't appear to be a valid SHA-256 hash"
            exit 1
          fi
          echo "✅ Successfully extracted hash: $HASH"

      - name: Extract Short Module Name
        shell: bash
        run: |
          # Use sed to extract module name instead of bash regex
          PKG_NAME="${{ inputs.package_name }}"
          # Extract "basic" from "tollgate-module-basic-go"
          SHORT_MODULE=$(echo "$PKG_NAME" | sed -E 's/tollgate-module-(.+)-go/\1/')
          # If the pattern didn't match, try simpler approach
          if [ "$SHORT_MODULE" = "$PKG_NAME" ]; then
            SHORT_MODULE=$(echo "$PKG_NAME" | sed 's/tollgate-module-//g' | sed 's/-go//g')
          fi
          
          echo "SHORT_MODULE=$SHORT_MODULE" >> $GITHUB_ENV
          DEVICE="dummy_device"
          PACKAGE_SHORT_FILENAME="${SHORT_MODULE}-${DEVICE}-${MODEL}.ipk"
          echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
          echo "PACKAGE_CONTENT=TollGate Module Package: ${SHORT_MODULE} for ${DEVICE}" >> $GITHUB_ENV

      - name: Install Python for NIP-94 action
        run: |
          # Install Python and required packages
          apt-get update
          apt-get install -y python3 python3-pip git
          
          # Install required Python packages
          pip3 install requests py-nostr

      - name: Publish Package NIP-94 Metadata manually
        run: |
          # Create a Python script to publish metadata
          cat > publish_metadata.py << 'EOL'
          import os
          import json
          import time
          import requests
          from nostr.key import PrivateKey
          from nostr.event import Event
          from nostr.relay_manager import RelayManager

          # Get environment variables
          url = os.environ.get('PACKAGE_URL')
          file_hash = os.environ.get('PACKAGE_HASH')
          filename = os.environ.get('PACKAGE_SHORT_FILENAME')
          content = os.environ.get('PACKAGE_CONTENT')
          mime_type = "application/octet-stream"
          file_size = os.environ.get('PACKAGE_SIZE')
          architecture = os.environ.get('MODEL', 'generic')
          nsec = os.environ.get('NSEC')

          # Setup Nostr private key
          private_key = PrivateKey.from_nsec(nsec) if nsec.startswith('nsec') else PrivateKey(bytes.fromhex(nsec))
          
          # Create event for NIP-94
          event = Event(
              content=content,
              tags=[
                  ["url", url],
                  ["m", mime_type],
                  ["x", file_hash],
                  ["ox", file_hash],
                  ["size", str(file_size)],
                  ["dim", architecture],
                  ["alt", filename]
              ],
              kind=1063
          )
          
          # Sign the event
          event.sign(private_key.hex())
          
          # Setup relay manager
          relay_manager = RelayManager()
          relays = ["wss://relay.damus.io", "wss://nos.lol", "wss://nostr.mom"]
          for relay in relays:
              relay_manager.add_relay(relay)
          
          relay_manager.open_connections()
          time.sleep(1.5)
          
          # Publish event
          relay_manager.publish_event(event)
          time.sleep(2)
          
          # Close connections
          relay_manager.close_connections()
          
          # Output event ID for GitHub Actions
          print(f"EVENT_ID={event.id}")
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as f:
              f.write(f"EVENT_ID={event.id}\n")
              
          print(f"✅ Successfully published metadata with event ID: {event.id}")
          EOL
          
          # Run the script with container's Python
          python3 publish_metadata.py

      - name: Debug Event ID
        run: |
          echo "EVENT_ID from env: ${{ env.EVENT_ID }}"
          
          if [ -z "${{ env.EVENT_ID }}" ]; then
            echo "❌ No event ID was generated"
            exit 1
          else
            echo "✅ Successfully published with event ID: ${{ env.EVENT_ID }}"
          fi
