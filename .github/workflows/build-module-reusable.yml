# This workflow is reusable for building OpenWrt modules for different architectures
on:
  workflow_call:
    inputs:
      sdk_image:
        required: true
        type: string
      goarch:
        required: true
        type: string
      goarm:
        required: false
        type: string
      gomips:
        required: false
        type: string
      package_name:
        required: true
        type: string
    secrets:
      NSEC:
        description: "Nostr private key for NIP-94 publishing"
        required: true
      REPO_ACCESS_TOKEN:
        description: "GitHub token for repository dispatch"
        required: true
    outputs:
      package_url:
        description: "URL of the uploaded package on Blossom"
        value: ${{ jobs.build.outputs.package_url }}
      package_hash:
        description: "Hash of the uploaded package"
        value: ${{ jobs.build.outputs.package_hash }}
      package_size:
        description: "Size of the package in bytes"
        value: ${{ jobs.build.outputs.package_size }}
      short_module:
        description: "Short module name extracted from package name"
        value: ${{ jobs.build.outputs.short_module }}
      architecture:
        description: "Architecture identifier"
        value: ${{ jobs.build.outputs.architecture }}

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.sdk_image }}
      options: --user root
    outputs:
      package_url: ${{ steps.set_outputs.outputs.package_url }}
      package_hash: ${{ steps.set_outputs.outputs.package_hash }}
      package_size: ${{ steps.set_outputs.outputs.package_size }}
      short_module: ${{ steps.set_outputs.outputs.short_module }}
      architecture: ${{ steps.set_outputs.outputs.architecture }}

    steps:
      - name: Environment Info
        run: |
          echo "Building for SDK image: ${{ inputs.sdk_image }}"
          echo "GOARCH: ${{ inputs.goarch }}"
          echo "GOARM: ${{ inputs.goarm }}"
          echo "GOMIPS: ${{ inputs.gomips }}"

      - uses: actions/checkout@v4
        with:
          path: ${{ inputs.package_name }}/

      - name: Move sources to sdk folder
        run: |
          mv ${{ inputs.package_name }} /builder/package/${{ inputs.package_name }}

      - name: Install Golang
        run: |
          echo "deb https://deb.debian.org/debian bookworm-backports main" > /etc/apt/sources.list.d/backports.list
          apt-get update
          apt-get install -y -t bookworm-backports golang-go

      - name: Configure SDK
        run: |
          cd /builder
          make defconfig
          echo "CONFIG_PACKAGE_${{ inputs.package_name }}=y" >> .config

      - name: Compile Package
        run: |
          cd /builder
          env GOOS=linux \
          GOARCH=${{ inputs.goarch }} \
          GOMIPS=${{ inputs.gomips }} \
          GOARM=${{ inputs.goarm }} \
          make -j$(nproc) V=sc package/${{ inputs.package_name }}/compile

      - name: List output package(s)
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.ipk" -type f | grep -v nodogsplash | head -n1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No .ipk package found in /builder/bin/packages"
            exit 1
          fi
          echo "✅ Found package at: $PACKAGE_PATH"
          FILENAME=$(basename "$PACKAGE_PATH")
          echo "PACKAGE_FILENAME=$FILENAME" >> $GITHUB_ENV
          mkdir -p /github/workspace/artifacts/${{ inputs.goarch }}
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${{ inputs.goarch }}/$FILENAME"

      - name: GitHub Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ inputs.package_name }}-${{ inputs.goarch }}
          path: /github/workspace/artifacts/${{ inputs.goarch }}
          retention-days: 5

      - name: Prepare package metadata
        id: package_info
        run: |
          PACKAGE_PATH=$(find /github/workspace/artifacts/${{ inputs.goarch }} -name "*.ipk" -type f | head -n1)
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          
          # Determine architecture identifier based on input params
          ARCH_ID="${{ inputs.goarch }}"
          if [[ "${{ inputs.goarch }}" == "arm64" ]]; then
            ARCH_ID="aarch64_cortex-a53"
          elif [[ "${{ inputs.goarch }}" == "arm" && "${{ inputs.goarm }}" == "7" ]]; then
            ARCH_ID="arm_cortex-a9"
          elif [[ "${{ inputs.goarch }}" == "mipsle" && "${{ inputs.gomips }}" == "softfloat" ]]; then
            ARCH_ID="mipsel_24kc"
          elif [[ "${{ inputs.goarch }}" == "mips" && "${{ inputs.gomips }}" == "softfloat" ]]; then
            ARCH_ID="mips_24kc"
          fi
          echo "ARCH_ID=$ARCH_ID" >> $GITHUB_ENV

      - name: Blossom Artifact upload
        id: blossom_upload
        uses: Origami74/upload-blossom-action@improve-io
        with:
          host: "https://blossom.swissdash.site"
          filePath: ${{ env.PACKAGE_PATH }}

      - name: Process Blossom response and extract hash
        shell: bash
        run: |
          echo "Upload outputs:"
          echo "  URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "  Hash: ${{ steps.blossom_upload.outputs.hash }}"
          echo "  Size: ${{ env.PACKAGE_SIZE }} bytes"
          URL="${{ steps.blossom_upload.outputs.url }}"
          FILENAME=$(basename "$URL")
          HASH="${FILENAME%.ipk}"
          echo "Extracted hash from URL: $HASH"
          echo "PACKAGE_URL=$URL" >> $GITHUB_ENV
          echo "PACKAGE_HASH=$HASH" >> $GITHUB_ENV
          if [ -z "$HASH" ]; then
            echo "❌ ERROR: Failed to extract hash from URL"
            exit 1
          fi
          # Use grep for POSIX-compatible regex check instead of [[ =~ ]]
          if ! echo "$HASH" | grep -qE '^[0-9a-f]{64}$'; then
            echo "❌ ERROR: Extracted hash doesn't appear to be a valid SHA-256 hash"
            exit 1
          fi
          echo "✅ Successfully extracted hash: $HASH"

      - name: Extract Short Module Name
        shell: bash
        run: |
          # Use sed to extract module name instead of bash regex
          PKG_NAME="${{ inputs.package_name }}"
          # Extract "basic" from "tollgate-module-basic-go"
          SHORT_MODULE=$(echo "$PKG_NAME" | sed -E 's/tollgate-module-(.+)-go/\1/')
          # If the pattern didn't match, try simpler approach
          if [ "$SHORT_MODULE" = "$PKG_NAME" ]; then
            SHORT_MODULE=$(echo "$PKG_NAME" | sed 's/tollgate-module-//g' | sed 's/-go//g')
          fi
          
          echo "SHORT_MODULE=$SHORT_MODULE" >> $GITHUB_ENV

      - name: Set job outputs
        id: set_outputs
        run: |
          echo "package_url=${{ env.PACKAGE_URL }}" >> $GITHUB_OUTPUT
          echo "package_hash=${{ env.PACKAGE_HASH }}" >> $GITHUB_OUTPUT
          echo "package_size=${{ env.PACKAGE_SIZE }}" >> $GITHUB_OUTPUT
          echo "short_module=${{ env.SHORT_MODULE }}" >> $GITHUB_OUTPUT
          echo "architecture=${{ env.ARCH_ID }}" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "Build Summary:"
          echo "✅ Package successfully built and uploaded to Blossom"
          echo "Package URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "Package Hash: ${{ env.PACKAGE_HASH }}"
          echo "Architecture: ${{ env.ARCH_ID }}"
  
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Prepare metadata for NIP-94
        run: |
          # Create standardized filename for the package
          DEVICE="gl-mt3000"
          PACKAGE_SHORT_FILENAME="${{ needs.build.outputs.short_module }}-${DEVICE}-${{ needs.build.outputs.architecture }}.ipk"
          echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
          
          # Create a simplified content format
          echo "PACKAGE_CONTENT=TollGate Module Package: ${{ needs.build.outputs.short_module }} for ${DEVICE}" >> $GITHUB_ENV

      - name: Publish Package NIP-94 Metadata
        id: publish_package
        uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
        with:
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/
          url: ${{ needs.build.outputs.package_url }}
          mimeType: application/octet-stream
          fileHash: ${{ needs.build.outputs.package_hash }}
          originalHash: ${{ needs.build.outputs.package_hash }}
          filename: "${{ env.PACKAGE_SHORT_FILENAME }}"
          content: "${{ env.PACKAGE_CONTENT }}"
          nsec: ${{ secrets.NSEC }}
          size: ${{ needs.build.outputs.package_size }}
          architecture: "${{ needs.build.outputs.architecture }}"

      - name: Debug Event ID
        run: |
          echo "EVENT_ID from env: ${{ env.EVENT_ID }}"
          echo "NOTE_ID from env: ${{ env.NOTE_ID }}"
          echo "Output from publish step: ${{ steps.publish_package.outputs.eventId || 'not set' }}"
          echo "Outputs available:"
          echo "${{ toJSON(steps.publish_package.outputs) }}"

      - name: Verify Package NIP-94 Event
        id: verify_package
        if: env.EVENT_ID != ''
        uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
        with:
          eventId: ${{ env.EVENT_ID }}
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/

      - name: Check Package Publication
        if: steps.verify_package.outcome == 'failure'
        run: |
          echo "❌ Failed to verify package publication on relays"
          exit 1
          
      - name: Check Event ID
        if: env.EVENT_ID == ''
        run: |
          echo "❌ No event ID was generated by the publish step"
          exit 1

      - name: Publication Summary
        run: |
          echo "Publication Summary:"
          echo "✅ Package metadata successfully published to Nostr"
          echo "Event ID: ${{ env.EVENT_ID || steps.publish_package.outputs.eventId }}"
          echo "Package URL: ${{ needs.build.outputs.package_url }}"
          
      - name: Trigger OS Workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: OpenTollGate/tollgate-os
          event-type: update-release-json
