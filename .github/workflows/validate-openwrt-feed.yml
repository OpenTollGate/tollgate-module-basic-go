name: Validate OpenWrt Feed

on:
  push:
    paths:
      - 'packaging/openwrt-feed/**'
      - 'src/**'
      - 'tests/validate-golang-pkg-layout.sh'
      - '.github/workflows/validate-openwrt-feed.yml'
  pull_request:
    paths:
      - 'packaging/openwrt-feed/**'
      - 'src/**'
      - 'tests/validate-golang-pkg-layout.sh'
      - '.github/workflows/validate-openwrt-feed.yml'

env:
  OPENWRT_TARGET: x86/64

jobs:
  validate-feed-makefile:
    name: Lint feed Makefile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Makefile syntax
        run: |
          MAKEFILE="packaging/openwrt-feed/net/tollgate-wrt/Makefile"
          if [ ! -f "$MAKEFILE" ]; then
            echo "ERROR: $MAKEFILE not found"
            exit 1
          fi

          grep -q '^PKG_NAME:' "$MAKEFILE"    || { echo "FAIL: missing PKG_NAME"; exit 1; }
          grep -q '^PKG_VERSION:' "$MAKEFILE"  || { echo "FAIL: missing PKG_VERSION"; exit 1; }
          grep -q '^PKG_RELEASE:' "$MAKEFILE"  || { echo "FAIL: missing PKG_RELEASE"; exit 1; }
          grep -q '^PKG_SOURCE_URL:' "$MAKEFILE" || { echo "FAIL: missing PKG_SOURCE_URL"; exit 1; }
          grep -q '^PKG_HASH:' "$MAKEFILE"     || { echo "FAIL: missing PKG_HASH"; exit 1; }
          grep -q '^PKG_LICENSE:' "$MAKEFILE"  || { echo "FAIL: missing PKG_LICENSE"; exit 1; }
          grep -q '^GO_PKG:' "$MAKEFILE"       || { echo "FAIL: missing GO_PKG"; exit 1; }
          grep -q '^GO_PKG_BUILD_PKG:' "$MAKEFILE" || { echo "FAIL: missing GO_PKG_BUILD_PKG"; exit 1; }
          grep -q 'BuildPackage' "$MAKEFILE"   || { echo "FAIL: missing BuildPackage"; exit 1; }

          grep -q 'REPLACES' "$MAKEFILE"       && { echo "FAIL: REPLACES not allowed upstream"; exit 1; }

          # PKG_BUILD_DIR must point at the src/ subdirectory where go.mod lives
          if ! grep '^PKG_BUILD_DIR:' "$MAKEFILE" | grep -q '/src$'; then
            echo "FAIL: PKG_BUILD_DIR must end with /src (go.mod is in src/ subdir)"
            exit 1
          fi

          # GO_PKG_LDFLAGS_X must use /src/cli not /cli (go.mod: .../src/cli => ./cli)
          # /cli.Version would match inside /src/cli.Version, so check that
          # every cli.Version line also contains /src/cli
          if grep 'GO_PKG_LDFLAGS_X' "$MAKEFILE" -A3 | grep 'cli\.Version' | grep -qv '/src/cli'; then
            echo "FAIL: GO_PKG_LDFLAGS_X uses cli.Version without /src/ prefix"
            exit 1
          fi

          echo "Makefile lint passed."

      - name: Verify PKG_HASH is not 'skip'
        run: |
          MAKEFILE="packaging/openwrt-feed/net/tollgate-wrt/Makefile"
          HASH=$(grep '^PKG_HASH:' "$MAKEFILE" | sed 's/PKG_HASH:=//')
          if [ "$HASH" = "skip" ]; then
            echo "FAIL: PKG_HASH must be a real sha256, not 'skip'"
            exit 1
          fi
          echo "PKG_HASH=$HASH"

      - name: Verify source tarball is fetchable
        run: |
          MAKEFILE="packaging/openwrt-feed/net/tollgate-wrt/Makefile"
          PKG_VERSION=$(grep '^PKG_VERSION:' "$MAKEFILE" | sed 's/PKG_VERSION:=//')
          URL="https://codeload.github.com/OpenTollGate/tollgate-module-basic-go/tar.gz/v${PKG_VERSION}"
          echo "Fetching $URL ..."
          HTTP_CODE=$(curl -sI -o /dev/null -w '%{http_code}' "$URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: source tarball returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Source tarball fetchable (HTTP $HTTP_CODE)."

      - name: Verify PKG_HASH matches tarball
        run: |
          MAKEFILE="packaging/openwrt-feed/net/tollgate-wrt/Makefile"
          EXPECTED=$(grep '^PKG_HASH:' "$MAKEFILE" | sed 's/PKG_HASH:=//')
          PKG_VERSION=$(grep '^PKG_VERSION:' "$MAKEFILE" | sed 's/PKG_VERSION:=//')
          URL="https://codeload.github.com/OpenTollGate/tollgate-module-basic-go/tar.gz/v${PKG_VERSION}"
          ACTUAL=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "FAIL: PKG_HASH mismatch"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "PKG_HASH verified."

      - name: Verify files/ directory structure
        run: |
          BASE="packaging/openwrt-feed/net/tollgate-wrt"
          for f in \
            files/etc/init.d/tollgate-wrt \
            files/etc/config/firewall-tollgate \
            files/etc/uci-defaults/99-tollgate-setup \
            files/etc/hotplug.d/iface/95-tollgate-restart \
            files/lib/upgrade/keep.d/tollgate; do
            if [ ! -f "$BASE/$f" ]; then
              echo "FAIL: missing $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Verify referenced paths exist in Makefile install section
        run: |
          BASE="packaging/openwrt-feed/net/tollgate-wrt"
          MAKEFILE="$BASE/Makefile"
          grep -oP '\./files/\S+' "$MAKEFILE" | sed 's/\*$//' | while read -r ref; do
            path="$BASE/${ref#./}"
            if [ ! -e "$path" ]; then
              echo "FAIL: Makefile references $ref but $path does not exist"
              exit 1
            fi
          done
          echo "All referenced files exist."

  validate-go-build:
    name: Go cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Verify Go module
        run: |
          (cd src && go mod verify && go vet ./...)
          (cd src/cmd/tollgate-cli && go mod verify)

      - name: Cross-compile for linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          (cd src && go build -o /dev/null ./cmd/tollgate-wrt)
          (cd src/cmd/tollgate-cli && go build -o /dev/null .)

      - name: Cross-compile for linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          (cd src && go build -o /dev/null ./cmd/tollgate-wrt)
          (cd src/cmd/tollgate-cli && go build -o /dev/null .)

      - name: Cross-compile for linux/mipsle
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: mipsle
          GOMIPS: softfloat
        run: |
          (cd src && go build -o /dev/null ./cmd/tollgate-wrt)
          (cd src/cmd/tollgate-cli && go build -o /dev/null .)

  validate-golang-pkg-layout:
    name: golang-package.mk layout validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Run golang-package.mk layout validator
        run: |
          chmod +x tests/validate-golang-pkg-layout.sh
          bash tests/validate-golang-pkg-layout.sh

      - name: Cross-compile with feed Makefile ldflags
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          # Prove the corrected GO_PKG_LDFLAGS_X paths actually inject
          LDFLAGS="-s -w \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.Version=v0.4.0-test' \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.GitCommit=deadbeef' \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.BuildTime=0'"
          (cd src && go build -trimpath -ldflags="$LDFLAGS" -o /tmp/tollgate-wrt ./cmd/tollgate-wrt)
          # Verify version was injected
          if strings /tmp/tollgate-wrt | grep -q 'v0.4.0-test'; then
            echo "PASS: version injected via /src/cli ldflags path"
          else
            echo "FAIL: version NOT found in binary — ldflags path wrong"
            exit 1
          fi
