name: Build and Publish

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  PACKAGE_NAME: "tollgate-wrt"
  GO_VERSION: "1.24.2"
  DEBUG: "true"

jobs:
  # Unique Go build tuples. Each row produces one binary artifact that may
  # be consumed by multiple package-matrix cells (e.g. aarch64_cortex-a53
  # and aarch64_cortex-a72 share the same arm64 binary).
  define-compile-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          cat > matrix.json << 'EOF'
          {
            "include": [
              { "compile_key": "arm64",           "goarch": "arm64" },
              { "compile_key": "armv7",           "goarch": "arm",    "goarm": "7" },
              { "compile_key": "mipsle-softfloat","goarch": "mipsle", "gomips": "softfloat" },
              { "compile_key": "mips-softfloat",  "goarch": "mips",   "gomips": "softfloat" }
            ]
          }
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> $GITHUB_OUTPUT

  # Package matrix. Each cell declares which compile_key it consumes, which
  # SDK image to run in, and the output package format (ipk for 24.10.x,
  # apk for 25.12.x). Compression variants fan out here — not in compile.
  define-package-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      publish_matrix: ${{ steps.set-matrix.outputs.publish_matrix }}
    steps:
      - id: set-matrix
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          cat > matrix.json << 'EOF'
          {
            "include": [
              { "architecture": "aarch64_cortex-a53", "compile_key": "arm64",            "sdk": "mediatek-filogic", "openwrt_version": "24.10.1", "format": "ipk" },
              { "architecture": "aarch64_cortex-a53", "compile_key": "arm64",            "sdk": "mediatek-filogic", "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-ultra-brute" },
              { "architecture": "aarch64_cortex-a72", "compile_key": "arm64",            "sdk": "bcm27xx-bcm2711",  "openwrt_version": "24.10.1", "format": "ipk" },
              { "architecture": "aarch64_cortex-a72", "compile_key": "arm64",            "sdk": "bcm27xx-bcm2711",  "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-ultra-brute" },
              { "architecture": "arm_cortex-a7",      "compile_key": "armv7",            "sdk": "bcm27xx-bcm2709",  "openwrt_version": "24.10.1", "format": "ipk" },
              { "architecture": "arm_cortex-a7",      "compile_key": "armv7",            "sdk": "bcm27xx-bcm2709",  "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-ultra-brute" },
              { "architecture": "mipsel_24kc",        "compile_key": "mipsle-softfloat", "sdk": "ramips-mt7621",    "openwrt_version": "24.10.1", "format": "ipk" },
              { "architecture": "mipsel_24kc",        "compile_key": "mipsle-softfloat", "sdk": "ramips-mt7621",    "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-ultra-brute" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "24.10.1", "format": "ipk" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-fast" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-best" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-brute" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "24.10.1", "format": "ipk", "compression": "upx-ultra-brute" },

              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "25.12.0", "format": "apk" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "25.12.0", "format": "apk", "compression": "upx-fast" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "25.12.0", "format": "apk", "compression": "upx-best" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "25.12.0", "format": "apk", "compression": "upx-brute" },
              { "architecture": "mips_24kc",          "compile_key": "mips-softfloat",   "sdk": "ath79-generic",    "openwrt_version": "25.12.0", "format": "apk", "compression": "upx-ultra-brute" }
            ]
          }
          EOF
          # TODO: Once matching openwrt/sdk:*-25.12.0 tags exist for the other
          # targets (mediatek-filogic, bcm27xx-bcm2711, bcm27xx-bcm2709,
          # ramips-mt7621), extend the apk block to mirror the ipk coverage.
          # TODO: AMD64 remains disabled — SDK arch 'amd64' vs 'x86-generic' mismatch.
          echo "matrix=$(jq -c . matrix.json)" >> $GITHUB_OUTPUT
          # publish_matrix: initial rollout publishes ipk only. apk artifacts
          # are still built and uploaded to GH artifacts for verification,
          # but not pushed to Blossom/nostr until distribution is wired up.
          echo "publish_matrix=$(jq -c '{include: [.include[] | select(.format == "ipk")]}' matrix.json)" >> $GITHUB_OUTPUT

  determine-versioning:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.determine-package-version.outputs.package_version }}
      release_channel: ${{ steps.determine-release-channel.outputs.release_channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: commit-hash
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set package_version variable
        id: determine-package-version
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "package_version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            SANITIZED_BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
            COMMIT_HEIGHT=$(git rev-list --count HEAD)
            echo "package_version=${SANITIZED_BRANCH_NAME}.${COMMIT_HEIGHT}.${{ steps.commit-hash.outputs.short }}" >> $GITHUB_OUTPUT
          fi

      - name: Set release channel
        id: determine-release-channel
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            if   [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha ]]; then echo "release_channel=alpha"  >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta  ]]; then echo "release_channel=beta"   >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+$      ]]; then echo "release_channel=stable" >> $GITHUB_OUTPUT
            else                                                          echo "release_channel=dev"    >> $GITHUB_OUTPUT
            fi
          else
            echo "release_channel=dev" >> $GITHUB_OUTPUT
          fi

  # Native cross-compile of tollgate-wrt + tollgate CLI. One job per unique
  # Go tuple. Produces a tarball consumed by every package-matrix cell that
  # declares the same compile_key.
  compile-binaries:
    needs: [define-compile-matrix, determine-versioning]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.define-compile-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: src/go.sum

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          PACKAGE_VERSION: ${{ needs.determine-versioning.outputs.package_version }}
        run: |
          set -eu
          mkdir -p bin
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          GIT_COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.Version=$PACKAGE_VERSION' \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.GitCommit=$GIT_COMMIT' \
            -X 'github.com/OpenTollGate/tollgate-module-basic-go/src/cli.BuildTime=$BUILD_TIME'"

          echo "Building service for GOARCH=$GOARCH GOARM=$GOARM GOMIPS=$GOMIPS"
          env GOOS=linux go build -C src -o "$GITHUB_WORKSPACE/bin/tollgate-wrt" -trimpath -ldflags="$LDFLAGS" main.go

          echo "Building CLI..."
          env GOOS=linux go build -C src/cmd/tollgate-cli -o "$GITHUB_WORKSPACE/bin/tollgate" -trimpath -ldflags="$LDFLAGS"

          ls -lh bin/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.compile_key }}
          path: bin/
          retention-days: 5

  # Package the prebuilt binaries inside an openwrt SDK container. No Go
  # toolchain here — only staging, optional UPX, and the SDK's package
  # layout/metadata step. Fans out per architecture + compression + format.
  package-binaries:
    needs: [define-package-matrix, determine-versioning, compile-binaries]
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:${{ matrix.sdk }}-${{ matrix.openwrt_version }}
      options: --user root
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-package-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: src-checkout
          fetch-depth: 1

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.compile_key }}
          path: bin/

      - name: Install UPX
        if: contains(matrix.compression, 'upx')
        run: |
          apt-get update
          apt-get install -y upx-ucl

      - name: Stage SDK package tree
        id: stage
        run: |
          set -eu
          COMPRESSION_SUFFIX=""
          [ -n "${{ matrix.compression }}" ] && COMPRESSION_SUFFIX="-${{ matrix.compression }}"
          PACKAGE_FILENAME=${PACKAGE_NAME}_${{ needs.determine-versioning.outputs.package_version }}_${{ matrix.architecture }}${COMPRESSION_SUFFIX}.${{ matrix.format }}
          echo "PACKAGE_FILENAME=$PACKAGE_FILENAME" >> $GITHUB_ENV
          echo "COMPRESSION_SUFFIX=$COMPRESSION_SUFFIX" >> $GITHUB_ENV

          STAGE=/builder/package/${PACKAGE_NAME}
          mkdir -p "$STAGE"
          cp -r src-checkout/packaging/. "$STAGE/"
          cp src-checkout/LICENSE "$STAGE/LICENSE"
          install -m 0755 bin/tollgate-wrt "$STAGE/tollgate-wrt"
          install -m 0755 bin/tollgate     "$STAGE/tollgate"
          ls -la "$STAGE"

      - name: Configure SDK
        run: |
          cd /builder
          make defconfig
          {
            echo "CONFIG_PACKAGE_${PACKAGE_NAME}=y"
            echo "CONFIG_PACKAGE_nodogsplash=y"
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_jq=y"
            if [ "${{ matrix.format }}" = "apk" ]; then
              echo "CONFIG_USE_APK=y"
            fi
          } >> .config
          make defconfig

      - name: Compile package
        shell: bash
        run: |
          cd /builder
          if [ -n "${{ matrix.compression }}" ]; then
            export USE_UPX=1
            COMP="${{ matrix.compression }}"
            export UPX_FLAGS="--${COMP#upx-}"
          else
            export USE_UPX=0
          fi
          env \
            PACKAGE_VERSION=${{ needs.determine-versioning.outputs.package_version }} \
            USE_UPX=$USE_UPX \
            UPX_FLAGS="$UPX_FLAGS" \
            make -j$(nproc) ${{ env.DEBUG == 'true' && 'V=sc' || '' }} package/${PACKAGE_NAME}/compile

      - name: Collect artifact
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.${{ matrix.format }}" -type f | head -n1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "No .${{ matrix.format }} package found" >&2
            find /builder/bin -maxdepth 5 -type f | head -50
            exit 1
          fi
          ls -lh "$PACKAGE_PATH"
          mkdir -p /github/workspace/artifacts
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${PACKAGE_FILENAME}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_FILENAME }}
          path: /github/workspace/artifacts/${{ env.PACKAGE_FILENAME }}
          retention-days: 5

  publish-metadata:
    needs: [determine-versioning, package-binaries, define-package-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ubuntu:latest
      options: --user root
    strategy:
      # publish_matrix is pre-filtered to format==ipk. apk publication
      # to Blossom/nostr is intentionally deferred — see define-package-matrix.
      matrix: ${{ fromJson(needs.define-package-matrix.outputs.publish_matrix) }}
    steps:
      - name: Initialize
        run: |
          COMPRESSION_SUFFIX=""
          COMPRESSION_TYPE="none"
          if [ -n "${{ matrix.compression }}" ]; then
            COMPRESSION_SUFFIX="-${{ matrix.compression }}"
            COMPRESSION_TYPE="${{ matrix.compression }}"
          fi
          PACKAGE_FILENAME=${{ env.PACKAGE_NAME }}_${{ needs.determine-versioning.outputs.package_version }}_${{ matrix.architecture }}${COMPRESSION_SUFFIX}.${{ matrix.format }}
          echo "PACKAGE_FILENAME=$PACKAGE_FILENAME" >> $GITHUB_ENV
          echo "COMPRESSION_SUFFIX=$COMPRESSION_SUFFIX" >> $GITHUB_ENV
          echo "COMPRESSION_TYPE=$COMPRESSION_TYPE" >> $GITHUB_ENV

      - name: Install required tools
        run: |
          apt-get update
          apt-get install -y curl jq

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_FILENAME }}
          path: ./artifacts

      - name: Get package size
        run: |
          PACKAGE_PATH=$(find ./artifacts -name "${{ env.PACKAGE_FILENAME }}" -type f | head -n1)
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> $GITHUB_ENV
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

      - name: Install nak
        run: |
          curl -L "https://github.com/fiatjaf/nak/releases/download/v0.16.2/nak-v0.16.2-linux-amd64" -o /usr/local/bin/nak
          chmod +x /usr/local/bin/nak
          nak --version

      - name: Blossom upload
        id: blossom_upload
        env:
          BLOSSOM_SERVER: "https://cmbethpcg000e5el0ehhk5933-blossom.eggstr.com"
          NSEC_HEX: ${{ secrets.NSEC_HEX }}
        run: |
          UPLOAD_RESPONSE=$(nak blossom upload --server "$BLOSSOM_SERVER" --sec "$NSEC_HEX" "${{ env.PACKAGE_PATH }}" < /dev/null)
          echo "$UPLOAD_RESPONSE"
          FILE_HASH=$(echo "$UPLOAD_RESPONSE" | jq -r '.sha256')
          if [ -z "$FILE_HASH" ] || [ "$FILE_HASH" = "null" ]; then
            echo "Failed to extract hash" >&2; exit 1
          fi
          echo "url=$BLOSSOM_SERVER/$FILE_HASH" >> $GITHUB_OUTPUT
          echo "hash=$FILE_HASH" >> $GITHUB_OUTPUT

      - name: Publish NIP-94 metadata
        id: publish_package
        env:
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
          NSEC_HEX: ${{ secrets.NSEC_HEX }}
        run: |
          set -e
          nak event --sec "$NSEC_HEX" -k 1063 \
            -c "TollGate Package: ${{ env.PACKAGE_NAME }} for ${{ matrix.architecture }}" \
            --tag url="${{ steps.blossom_upload.outputs.url }}" \
            --tag m="application/octet-stream" \
            --tag x="${{ steps.blossom_upload.outputs.hash }}" \
            --tag ox="${{ steps.blossom_upload.outputs.hash }}" \
            --tag filename="${{ env.PACKAGE_FILENAME }}" \
            --tag architecture="${{ matrix.architecture }}" \
            --tag A="${{ matrix.architecture }}" \
            --tag version="${{ needs.determine-versioning.outputs.package_version }}" \
            --tag v="${{ needs.determine-versioning.outputs.package_version }}" \
            --tag release_channel="${{ needs.determine-versioning.outputs.release_channel }}" \
            --tag c="${{ needs.determine-versioning.outputs.release_channel }}" \
            --tag package_name="${{ env.PACKAGE_NAME }}" \
            --tag n="${{ env.PACKAGE_NAME }}" \
            --tag compression="${{ env.COMPRESSION_TYPE }}" \
            --tag format="${{ matrix.format }}" \
            > event.json 2> event.err

          if [ ! -s event.json ]; then
            cat event.err >&2
            exit 1
          fi
          EVENT_ID=$(jq -r '.id' event.json)
          cat event.json | nak event $RELAYS
          echo "eventId=$EVENT_ID" >> $GITHUB_OUTPUT

      - name: Verify event
        env:
          EVENT_ID: ${{ steps.publish_package.outputs.eventId }}
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
        run: |
          FOUND=0
          for relay in $RELAYS; do
            RESULT=$(nak req -i "$EVENT_ID" "$relay" 2>/dev/null || echo "")
            [ -n "$RESULT" ] && { echo "Found on $relay"; FOUND=1; }
          done
          [ $FOUND -eq 0 ] && { echo "Event not found on any relay" >&2; exit 1; }
          echo "Event verified."

      - name: Build summary
        run: |
          echo "${{ matrix.architecture }} (${{ matrix.format }}${{ env.COMPRESSION_SUFFIX }}):"
          echo "  EventId: ${{ steps.publish_package.outputs.eventId }}"
          echo "  URL:     ${{ steps.blossom_upload.outputs.url }}"

  trigger-build-os:
    name: Trigger TollGate OS build
    runs-on: ubuntu-latest
    needs: [determine-versioning, publish-metadata]
    steps:
      - uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: OpenTollGate/tollgate-os
          event-type: build-os
          client-payload: |-
            {
              "override_tollgate_wrt_version": "${{ needs.determine-versioning.outputs.package_version }}"
            }
