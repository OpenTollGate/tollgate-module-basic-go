name: Build and Publish

on:
  push:

env:
  PACKAGE_NAME: "tollgate-module-basic-go"
  PRIMARY_ARCHITECTURE: "aarch64_cortex-a53"
  PRIMARY_TARGET: "mediatek/filogic"
  PRIMARY_TARGET_DEVICES: "GL-MT3000, GL-MT6000"

jobs:
  build-primary:
    name: "Build Primary - MediaTek Filogic (aarch64_cortex-a53)"
    uses: ./.github/workflows/build-module-reusable.yml
    with:
      sdk_image: openwrt/sdk:mediatek-filogic-${{ inputs.SDK_VERSION }}
      goarch: arm64
      package_name: tollgate-module-basic-go
      SDK_VERSION: ${{ github.event.inputs.SDK_VERSION || '23.05.3' }}

  build-others:
    if: github.ref == 'refs/heads/main'
    needs: build-primary
    strategy:
      matrix:
        include:
          - id: "mipsel_24kc"
            sdk_image: "openwrt/sdk:ramips-mt7621-${{ inputs.SDK_VERSION }}"
            goarch: "mipsle"
            gomips: "softfloat"
          - id: "x86_64"
            sdk_image: "openwrt/sdk:x86-64-${{ inputs.SDK_VERSION }}"
            goarch: "amd64"
          - id: "mips_24kc"
            sdk_image: "openwrt/sdk:ath79-generic-${{ inputs.SDK_VERSION }}"
            goarch: "mips"
            gomips: "softfloat"
          - id: "aarch64_cortex-a72"
            sdk_image: "openwrt/sdk:bcm27xx-bcm2711-${{ inputs.SDK_VERSION }}"
            goarch: "arm64"
          - id: "aarch64_generic"
            sdk_image: "openwrt/sdk:rockchip-armv8-${{ inputs.SDK_VERSION }}"
            goarch: "arm64"
          - id: "arm_cortex-a7_neon-vfpv4"
            sdk_image: "openwrt/sdk:ipq40xx-generic-${{ inputs.SDK_VERSION }}"
            goarch: "arm"
            goarm: "7"
          - id: "arm_cortex-a15_neon-vfpv4"
            sdk_image: "openwrt/sdk:ipq806x-generic-${{ inputs.SDK_VERSION }}"
            goarch: "arm"
            goarm: "7"
          - id: "arm_cortex-a9"
            sdk_image: "openwrt/sdk:bcm53xx-generic-${{ inputs.SDK_VERSION }}"
            goarch: "arm"
            goarm: "7"
          - id: "arm_cortex-a9_vfpv3-d16"
            sdk_image: "openwrt/sdk:mvebu-cortexa9-${{ inputs.SDK_VERSION }}"
            goarch: "arm"
            goarm: "7"
    uses: ./.github/workflows/build-module-reusable.yml
    with:
      sdk_image: ${{ matrix.sdk_image }}
      goarch: ${{ matrix.goarch }}
      goarm: ${{ matrix.goarm }}
      gomips: ${{ matrix.gomips }}
      package_name: tollgate-module-basic-go
      SDK_VERSION: ${{ github.event.inputs.SDK_VERSION || '23.05.3' }}

  publish-metadata:
    needs: [build-primary, build-others]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture:
          # ARM64 architectures
          - id: "aarch64_cortex-a53"
            display_name: "ARM64 Cortex-A53"
            device_examples: "GL-MT3000, GL-MT6000, Broadcom BCM4908, MediaTek MT7622"
          - id: "aarch64_cortex-a72"
            display_name: "ARM64 Cortex-A72"
            device_examples: "Raspberry Pi 4, Marvell Armada 37x0"
          - id: "aarch64_generic"
            display_name: "Generic ARM64"
            device_examples: "Rockchip, OcteonTX, Layerscape"
          # ARM 32-bit architectures  
          - id: "arm_cortex-a7_neon-vfpv4"
            display_name: "ARM Cortex-A7"
            device_examples: "Qualcomm IPQ40xx, MediaTek MT7623, Allwinner"
          - id: "arm_cortex-a9"
            display_name: "ARM Cortex-A9"
            device_examples: "Broadcom BCM53xx"
          - id: "arm_cortex-a15_neon-vfpv4"
            display_name: "ARM Cortex-A15"
            device_examples: "Qualcomm IPQ806x"
          - id: "arm_cortex-a9_vfpv3-d16"
            display_name: "ARM Cortex-A9 VFPv3"
            device_examples: "Marvell Armada"
          # MIPS architectures
          - id: "mipsel_24kc"
            display_name: "MIPS 24Kc (Little Endian)"
            device_examples: "D-Link COVR-X1860 A1, MT7621, MT7620, MT76x8"
          - id: "mips_24kc"
            display_name: "MIPS 24Kc (Big Endian)"
            device_examples: "TP-Link, Ubiquiti, ath79 devices"
          # x86 architectures
          - id: "x86_64"
            display_name: "x86-64"
            device_examples: "PC, servers, x86 virtual machines"
    
    steps:
      - name: Download artifact for architecture
        uses: actions/download-artifact@v4
        with:
          name: package-${{ env.PACKAGE_NAME }}-${{ matrix.architecture.id }}
          path: ./artifacts
      
      - name: Prepare package metadata
        id: package_info
        run: |
          PACKAGE_PATH=$(find ./artifacts -name "*.ipk" -type f | head -n1)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No package found for architecture ${{ matrix.architecture.id }}"
            exit 1
          fi
          
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # Calculate file size
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> $GITHUB_ENV
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "ARCHITECTURE=${{ matrix.architecture.id }}" >> $GITHUB_ENV
          echo "DEVICE_EXAMPLES=${{ matrix.architecture.device_examples }}" >> $GITHUB_ENV
          echo "DISPLAY_NAME=${{ matrix.architecture.display_name }}" >> $GITHUB_ENV

      - name: Blossom Artifact upload
        id: blossom_upload
        uses: Origami74/upload-blossom-action@improve-io
        with:
          host: "https://blossom.swissdash.site"
          filePath: ${{ env.PACKAGE_PATH }}
     
      - name: Process Blossom response and extract hash
        run: |
          echo "Upload outputs:"
          echo "  URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "  Hash: ${{ steps.blossom_upload.outputs.hash }}"
          echo "  Size: ${{ env.PACKAGE_SIZE }} bytes"
          
          # Extract hash from URL
          URL="${{ steps.blossom_upload.outputs.url }}"
          
          # Use basename to extract filename from URL
          FILENAME=$(basename "$URL")
          
          # Remove the file extension to get the hash
          HASH="${FILENAME%.ipk}"
          
          echo "Extracted hash from URL: $HASH"
          
          # Store values in environment variables
          echo "PACKAGE_URL=$URL" >> $GITHUB_ENV
          echo "PACKAGE_HASH=$HASH" >> $GITHUB_ENV
          
          # Verify hash was extracted successfully
          if [ -z "$HASH" ]; then
            echo "❌ ERROR: Failed to extract hash from URL"
            exit 1
          fi
          
          # Verify hash is a valid hex string (64 characters for SHA-256)
          if ! [[ $HASH =~ ^[0-9a-f]{64}$ ]]; then
            echo "❌ ERROR: Extracted hash doesn't appear to be a valid SHA-256 hash"
            exit 1
          fi
          
          echo "✅ Successfully extracted hash: $HASH"

      # Extract Short Module Name before publishing NIP-94 metadata
      - name: Extract Short Module Name
        run: |
          # Extract the basic part from tollgate-module-basic-go
          if [[ "${{ env.PACKAGE_NAME }}" =~ tollgate-module-(.+)-go ]]; then
            SHORT_MODULE="${BASH_REMATCH[1]}"
          else
            SHORT_MODULE="$(echo "${{ env.PACKAGE_NAME }}" | sed 's/tollgate-module-//g' | sed 's/-go//g')"
          fi
          echo "SHORT_MODULE=$SHORT_MODULE" >> $GITHUB_ENV
          
          # Create a standardized filename for the package
          ARCH="${{ env.ARCHITECTURE }}"
          PACKAGE_SHORT_FILENAME="${SHORT_MODULE}-${ARCH}.ipk"
          echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
          
          # Create a simplified content format
          echo "PACKAGE_CONTENT=TollGate Module Package: ${SHORT_MODULE} for ${{ env.DISPLAY_NAME }} (devices: ${{ env.DEVICE_EXAMPLES }})" >> $GITHUB_ENV

      - name: Publish Package NIP-94 Metadata
        id: publish_package
        uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
        with:
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/
          url: ${{ env.PACKAGE_URL }}
          mimeType: application/octet-stream
          fileHash: ${{ env.PACKAGE_HASH }}
          originalHash: ${{ env.PACKAGE_HASH }}
          filename: "${{ env.PACKAGE_SHORT_FILENAME }}"
          content: "${{ env.PACKAGE_CONTENT }}"
          nsec: ${{ secrets.NSEC }}
          size: ${{ env.PACKAGE_SIZE }}
          architecture: "${{ env.ARCHITECTURE }}"

      # Debug the outputs to see what's available
      - name: Debug Event ID
        run: |
          echo "EVENT_ID from env: ${{ env.EVENT_ID }}"
          echo "NOTE_ID from env: ${{ env.NOTE_ID }}"
          echo "Output from publish step: ${{ steps.publish_package.outputs.eventId || 'not set' }}"
          echo "Outputs available:"
          echo "${{ toJSON(steps.publish_package.outputs) }}"

      - name: Verify Package NIP-94 Event
        id: verify_package
        # Use environment variable instead of step output
        if: env.EVENT_ID != ''
        uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
        with:
          eventId: ${{ env.EVENT_ID }}
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/

      - name: Check Package Publication
        # Only run this step if the verification ran and failed
        if: steps.verify_package.outcome == 'failure'
        run: |
          echo "❌ Failed to verify package publication on relays"
          exit 1
          
      # Add a step to handle the case where EVENT_ID is empty
      - name: Check Event ID
        if: env.EVENT_ID == ''
        run: |
          echo "❌ No event ID was generated by the publish step"
          exit 1

      - name: Build Summary
        run: |
          echo "Build Summary for ${{ matrix.architecture.display_name }}:"
          echo "✅ Package successfully built and published"
          echo "Package URL: ${{ steps.blossom_upload.outputs.url }}"

  trigger-os-workflow:
    needs: publish-metadata
    runs-on: ubuntu-latest
    # Only trigger when all targets have been built and published
    if: ${{ always() && !contains(needs.*.result, 'failure') }}
    
    steps:
      - name: Trigger OS Workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: OpenTollGate/tollgate-os
          event-type: update-release-json

