name: Build and Publish

on:
  push:
  workflow_dispatch:
    inputs:
      SDK_VERSION:
        description: 'OpenWrt SDK version to use'
        required: false
        default: '23.05.3'
        type: string

env:
  PACKAGE_NAME: "tollgate-module-basic-go"
  CACHE_VERSION: "v1" # Increment this when you need to invalidate all caches
  SDK_VERSION: ${{ github.event.inputs.SDK_VERSION || '23.05.3' }} # Define SDK version once for all jobs

jobs:
  build-modules:
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          # Each entry maps an OpenWrt target to architecture using proper Go naming conventions
          - target_family: "mediatek"      
            target_board: "filogic"       
            arch: "aarch64_cortex-a53"    # OpenWrt package architecture
            goarch: "arm64"               # GOARCH value
          - target_family: "ramips"        
            target_board: "mt7621"
            arch: "mipsel_24kc"
            goarch: "mipsle"              # GOARCH value for MIPS little-endian
            gomips: "softfloat"           # GOMIPS value per OpenWrt convention
          - target_family: "x86"
            target_board: "64"             
            arch: "x86_64"
            goarch: "amd64"               # GOARCH value for x86_64
    name: "Build ${{ matrix.target_family}}/${{ matrix.target_board }}"
    runs-on: ubuntu-latest
    
    # First stage - Build in container
    container:
      image: openwrt/sdk:${{ matrix.target_family }}-${{ matrix.target_board }}-${{ github.event.inputs.SDK_VERSION || '23.05.3' }}
      options: --user root
    
    steps:
      - name: Environment Info
        run: |
          echo "SDK Version: ${{ env.SDK_VERSION }}"
          echo "Target Platform: ${{ matrix.target_family }}/${{ matrix.target_board }}"
          echo "Package Architecture: ${{ matrix.arch }}"
          echo "GOARCH: ${{ matrix.goarch }}"
          echo "GOARM: ${{ matrix.goarm }}"
          echo "GOMIPS: ${{ matrix.gomips }}"
          echo "GO386: ${{ matrix.go386 }}" 
          echo "Cache key components:"
          echo "SDK: ${{ matrix.target_family }}-${{ matrix.target_board }}-${{ env.SDK_VERSION }}"
          echo "Cache version: ${{ env.CACHE_VERSION }}"

      # Generate package version from git information before doing anything else
      - uses: actions/checkout@v4
        with:
          path: source-for-version
          fetch-depth: 0  # Need full history for commit count
      
      - name: Generate Package Version
        id: package_version
        run: |
          cd source-for-version
          # Get commit count and short commit hash
          COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
          # Create version string: [commit-count].[short-hash]
          VERSION="${COMMIT_COUNT}.${COMMIT_HASH}"
          echo "Generated version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "PKG_VERSION=${VERSION}" >> $GITHUB_ENV

      # Cache Go installation to speed up container initialization
      - name: Cache Golang
        id: cache-golang
        uses: actions/cache@v3
        with:
          path: /usr/bin/go
          key: ${{ env.CACHE_VERSION }}-golang-${{ matrix.target_family }}-${{ matrix.target_board }}-${{ env.SDK_VERSION }}

      # Install Go only if not cached
      - name: Install Golang
        if: steps.cache-golang.outputs.cache-hit != 'true'
        run: |
          echo "deb https://deb.debian.org/debian bookworm-backports main" > /etc/apt/sources.list.d/backports.list
          apt-get update
          apt-get install -y -t bookworm-backports golang-go

      # Cache common Go modules that might be used across builds
      - name: Cache common Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ env.CACHE_VERSION }}-go-common-modules-${{ matrix.target_family }}-${{ matrix.target_board }}-${{ env.SDK_VERSION }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-go-common-modules-${{ matrix.target_family }}-${{ matrix.target_board }}-

      # Pre-configure SDK before checking out code
      - name: Create empty package directory for SDK config
        run: |
          mkdir -p /builder/package/${{ env.PACKAGE_NAME }}
          touch /builder/package/${{ env.PACKAGE_NAME }}/.placeholder

      # Cache SDK configuration
      - name: Cache SDK configuration
        id: cache-sdk-config
        uses: actions/cache@v3
        with:
          path: /builder/.config
          key: ${{ env.CACHE_VERSION }}-sdk-config-${{ matrix.target_family }}-${{ matrix.target_board }}-${{ env.SDK_VERSION }}
          
      # Configure SDK only if not cached - this is independent of our code
      - name: Configure SDK
        if: steps.cache-sdk-config.outputs.cache-hit != 'true'
        run: |
          cd /builder
          make defconfig
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=y" >> .config

      # Only NOW checkout the code, after environment is setup and cached
      - uses: actions/checkout@v4
        with:
          path: ${{ env.PACKAGE_NAME }}-src/
          fetch-depth: 1  # Shallow clone for faster checkout

      # Move sources to the SDK folder
      - name: Move sources to sdk folder
        run: |
          # Remove the placeholder if it exists
          rm -f /builder/package/${{ env.PACKAGE_NAME }}/.placeholder
          # Move our actual code
          cp -r ${{ env.PACKAGE_NAME }}-src/* /builder/package/${{ env.PACKAGE_NAME }}/
          # Override version in Makefile with the one we generated
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ env.PKG_VERSION }}/" /builder/package/${{ env.PACKAGE_NAME }}/Makefile
          cat /builder/package/${{ env.PACKAGE_NAME }}/Makefile | grep PKG_VERSION

      # Cache project-specific Go modules (depends on code)
      - name: Cache project Go modules
        id: cache-project-go-modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ env.CACHE_VERSION }}-go-project-modules-${{ matrix.target_family }}-${{ matrix.target_board }}-${{ hashFiles('/builder/package/${{ env.PACKAGE_NAME }}/go.sum') }}-${{ env.SDK_VERSION }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-go-project-modules-${{ matrix.target_family }}-${{ matrix.target_board }}-

      # Compile the package
      - name: Compile Package
        run: |
          cd /builder
          env GOOS=linux \
          GOARCH=${{ matrix.goarch }} \
          GOMIPS=${{ matrix.gomips }} \
          GOARM=${{ matrix.goarm }} \
          make -j$(nproc) V=sc package/${{ env.PACKAGE_NAME }}/compile

      # The rest of your workflow remains unchanged
      - name: List output package(s)
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.ipk" -type f | grep -v nodogsplash | head -n1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No .ipk package found in /builder/bin/packages"
            exit 1
          fi
          echo "✅ Found package at: $PACKAGE_PATH"
          FILENAME=$(basename "$PACKAGE_PATH")
          echo "PACKAGE_FILENAME=$FILENAME" >> $GITHUB_ENV
          # Create directory using arch name from OpenWrt, not Go
          mkdir -p /github/workspace/artifacts/${{ matrix.arch }}
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${{ matrix.arch }}/$FILENAME"

      # Use a faster artifact upload with proper OpenWrt package naming convention
      - name: GitHub Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}_${{ env.PKG_VERSION }}-1_${{ matrix.arch }}
          path: /github/workspace/artifacts/${{ matrix.arch }}
          retention-days: 5
          compression-level: 9 # Maximum compression for faster upload

      - name: Prepare package metadata
        id: package_info
        run: |
          PACKAGE_PATH=$(find /github/workspace/artifacts/${{ matrix.goarch }} -name "*.ipk" -type f | head -n1)
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> $GITHUB_ENV
          
          # Use package architecture for the artifact
          echo "ARCH_ID=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "TARGET_ID=${{ matrix.target_family }}/${{ matrix.target_board }}" >> $GITHUB_ENV

      - name: Blossom Artifact upload
        id: blossom_upload
        uses: Origami74/upload-blossom-action@improve-io
        with:
          host: "https://blossom.swissdash.site"
          filePath: ${{ env.PACKAGE_PATH }}
          
      - name: Process Blossom response and extract hash
        shell: bash
        run: |
          echo "Upload outputs:"
          echo "  URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "  Hash: ${{ steps.blossom_upload.outputs.hash }}"
          echo "  Size: ${{ env.PACKAGE_SIZE }} bytes"
          URL="${{ steps.blossom_upload.outputs.url }}"
          FILENAME=$(basename "$URL")
          HASH="${FILENAME%.ipk}"
          echo "Extracted hash from URL: $HASH"
          echo "PACKAGE_URL=$URL" >> $GITHUB_ENV
          echo "PACKAGE_HASH=$HASH" >> $GITHUB_ENV
          if [ -z "$HASH" ]; then
            echo "❌ ERROR: Failed to extract hash from URL"
            exit 1
          fi
          # Use grep for POSIX-compatible regex check instead of [[ =~ ]]
          if ! echo "$HASH" | grep -qE '^[0-9a-f]{64}$'; then
            echo "❌ ERROR: Extracted hash doesn't appear to be a valid SHA-256 hash"
            exit 1
          fi
          echo "✅ Successfully extracted hash: $HASH"

      - name: Extract Short Module Name
        shell: bash
        run: |
          # Use sed to extract module name instead of bash regex
          PKG_NAME="${{ env.PACKAGE_NAME }}"
          # Extract "basic" from "tollgate-module-basic-go"
          SHORT_MODULE=$(echo "$PKG_NAME" | sed -E 's/tollgate-module-(.+)-go/\1/')
          # If the pattern didn't match, try simpler approach
          if [ "$SHORT_MODULE" = "$PKG_NAME" ]; then
            SHORT_MODULE=$(echo "$PKG_NAME" | sed 's/tollgate-module-//g' | sed 's/-go//g')
          fi
          
          echo "SHORT_MODULE=$SHORT_MODULE" >> $GITHUB_ENV
          
          # Create standardized filename for the package using OpenWrt naming convention
          DEVICE="gl-mt3000"
          VERSION="${{ env.SDK_VERSION }}-1"
          PACKAGE_SHORT_FILENAME="${{ env.PACKAGE_NAME }}_${VERSION}_${{ matrix.arch }}.ipk"
          echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
          
          # Create a simplified content format
          echo "PACKAGE_CONTENT=TollGate Module Package: ${SHORT_MODULE} for ${DEVICE}" >> $GITHUB_ENV
          
      - name: Prepare Environment Variables for Artifact
        run: |
          mkdir -p /github/workspace/env-artifacts
          ENV_FILE="/github/workspace/env-artifacts/build-env.txt"
          echo "PACKAGE_URL=${{ env.PACKAGE_URL }}" >> $ENV_FILE
          echo "PACKAGE_HASH=${{ env.PACKAGE_HASH }}" >> $ENV_FILE
          echo "PACKAGE_SIZE=${{ env.PACKAGE_SIZE }}" >> $ENV_FILE
          echo "SHORT_MODULE=${{ env.SHORT_MODULE }}" >> $ENV_FILE
          echo "PACKAGE_SHORT_FILENAME=${{ env.PACKAGE_SHORT_FILENAME }}" >> $ENV_FILE
          echo "PACKAGE_CONTENT=${{ env.PACKAGE_CONTENT }}" >> $ENV_FILE
          echo "ARCH_ID=${{ env.ARCH_ID }}" >> $ENV_FILE
          echo "TARGET_ID=${{ env.TARGET_ID }}" >> $ENV_FILE
          echo "GOARCH=${{ matrix.goarch }}" >> $ENV_FILE
          
          # Debug output to verify file contents
          echo "Created environment file with contents:"
          cat $ENV_FILE
          
      - name: Upload Environment Variables as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-env-${{ matrix.target_family }}-${{ matrix.target_board }}
          path: /github/workspace/env-artifacts/build-env.txt
          retention-days: 1

  publish:
    needs: build-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - target_family: "mediatek"
            target_board: "filogic"
            arch: "aarch64_cortex-a53"
            goarch: "arm64"
          - target_family: "ramips"
            target_board: "mt7621"
            arch: "mipsel_24kc"
            goarch: "mipsle"
          - target_family: "x86"
            target_board: "64"
            arch: "x86_64"
            goarch: "amd64"
    name: "Publish ${{ matrix.target_family }}/${{ matrix.target_board }}"
    steps:
      # Cache Python dependencies for NIP-94 action
      - name: Cache Python dependencies
        id: cache-python-deps
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ env.CACHE_VERSION }}-python-deps-${{ hashFiles('**/requirements.txt') || 'no-requirements' }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-python-deps-

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}_${{ env.PKG_VERSION }}-1_${{ matrix.arch }}
          path: ./artifacts

      - name: Download Environment Variables
        uses: actions/download-artifact@v4
        with:
          name: build-env-${{ matrix.target_family }}-${{ matrix.target_board }}
          path: ./env

      - name: Load Environment Variables
        run: |
          # Load environment variables from the build step
          if [ -f ./env/build-env.txt ]; then
            echo "Loading environment variables from build step"
            cat ./env/build-env.txt
            while IFS= read -r line; do
              if [[ "$line" == *"="* ]]; then
                echo "$line" >> $GITHUB_ENV
              fi
            done < ./env/build-env.txt
          else
            echo "❌ ERROR: Environment file not found"
            ls -la ./env/
            exit 1
          fi
          
          # Create standardized filename for the package if not already set
          if [ -z "$PACKAGE_SHORT_FILENAME" ]; then
            DEVICE="gl-mt3000"
            SHORT_MODULE=$(echo "$PACKAGE_NAME" | sed -E 's/tollgate-module-(.+)-go/\1/')
            # If the pattern didn't match, try simpler approach
            if [ "$SHORT_MODULE" = "$PACKAGE_NAME" ]; then
              SHORT_MODULE=$(echo "$PACKAGE_NAME" | sed 's/tollgate-module-//g' | sed 's/-go//g')
            fi
            PACKAGE_SHORT_FILENAME="${SHORT_MODULE}-${DEVICE}-${{ matrix.arch }}.ipk"
            echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
            
            # Create a simplified content format
            echo "PACKAGE_CONTENT=TollGate Module Package: ${SHORT_MODULE} for ${DEVICE}" >> $GITHUB_ENV
          fi

      - name: Publish Package NIP-94 Metadata
        id: publish_package
        uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
        with:
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/
          url: ${{ env.PACKAGE_URL }}
          mimeType: application/octet-stream
          fileHash: ${{ env.PACKAGE_HASH }}
          originalHash: ${{ env.PACKAGE_HASH }}
          filename: "${{ env.PACKAGE_SHORT_FILENAME }}"
          content: "${{ env.PACKAGE_CONTENT }}"
          nsec: ${{ secrets.NSEC }}
          size: ${{ env.PACKAGE_SIZE }}
          architecture: "${{ env.TARGET_ID || matrix.target_family }}/{{ matrix.target_board }}"

      - name: Debug Event ID
        run: |
          echo "EVENT_ID from env: ${{ env.EVENT_ID }}"
          echo "NOTE_ID from env: ${{ env.NOTE_ID }}"
          echo "Output from publish step: ${{ steps.publish_package.outputs.eventId || 'not set' }}"
          echo "Outputs available:"
          echo "${{ toJSON(steps.publish_package.outputs) }}"

      - name: Verify Package NIP-94 Event
        id: verify_package
        if: env.EVENT_ID != ''
        uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
        with:
          eventId: ${{ env.EVENT_ID }}
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/

      - name: Check Package Publication
        if: steps.verify_package.outcome == 'failure'
        run: |
          echo "❌ Failed to verify package publication on relays"
          exit 1
          
      - name: Check Event ID
        if: env.EVENT_ID == ''
        run: |
          echo "❌ No event ID was generated by the publish step"
          exit 1

      - name: Publication Summary
        run: |
          echo "Publication Summary:"
          echo "✅ Package metadata successfully published to Nostr"
          echo "Event ID: ${{ env.EVENT_ID || steps.publish_package.outputs.eventId }}"
          echo "Package URL: ${{ env.PACKAGE_URL }}"

  trigger-os-workflow:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OS Workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: OpenTollGate/tollgate-os
          event-type: update-release-json
