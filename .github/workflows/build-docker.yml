name: Build and Publish

on:
  push:

## Add global env vars for the whole workflow
env:
  PACKAGE_NAME: "tollgate-module-basic-go"
  # Global vars that aren't target-specific
  # DEBUG: "true"

jobs:
  build-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: "mediatek/filogic" # Devices: GL-MT3000, GL-MT6000
            sdk_image: "openwrt/sdk:mediatek-filogic-23.05.3"
            architecture: "aarch64_cortex-a53"
            goarch: "arm64"
          - name: "ramips/mt7621" # Devices: D-Link COVR-X1860 A1
            sdk_image: "openwrt/sdk:ramips-mt7621-23.05.3"
            architecture: "mipsel_24kc"
            goarch: "mipsle"
            gomips: "softfloat"
          # Additional common architectures
          - name: "x86/64" # x86_64 architecture
            sdk_image: "openwrt/sdk:x86-64-23.05.3"
            architecture: "x86_64"
            goarch: "amd64"
          - name: "ath79/generic" # Many popular devices (TP-Link, Ubiquiti, etc)
            sdk_image: "openwrt/sdk:ath79-generic-23.05.3"
            architecture: "mips_24kc"
            goarch: "mips"
            gomips: "softfloat"
          - name: "bcm27xx/bcm2711" # Raspberry Pi 4
            sdk_image: "openwrt/sdk:bcm27xx-bcm2711-23.05.3"
            architecture: "aarch64_cortex-a72"
            goarch: "arm64"
          - name: "rockchip/armv8" # Devices like NanoPi R4S
            sdk_image: "openwrt/sdk:rockchip-armv8-23.05.3"
            architecture: "aarch64_generic"
            goarch: "arm64"
          - name: "ipq40xx/generic" # Devices like GL.iNet GL-B1300
            sdk_image: "openwrt/sdk:ipq40xx-generic-23.05.3"
            architecture: "arm_cortex-a7_neon-vfpv4"
            goarch: "arm"
            goarm: "7"
          - name: "ipq806x/generic" # Devices like Netgear R7800
            sdk_image: "openwrt/sdk:ipq806x-generic-23.05.3"
            architecture: "arm_cortex-a15_neon-vfpv4"
            goarch: "arm"
            goarm: "7"
          - name: "bcm53xx/generic" # Devices like Netgear R8000
            sdk_image: "openwrt/sdk:bcm53xx-generic-23.05.3"
            architecture: "arm_cortex-a9"
            goarch: "arm"
            goarm: "7"
      fail-fast: false # Continue with other targets if one fails

    container:
      image: ${{ matrix.target.sdk_image }}
      options: --user root # https://github.com/actions/checkout/issues/1575#issuecomment-2536435128

    steps:
      - uses: actions/checkout@v3
        with:
          path: ${{ env.PACKAGE_NAME }}/

      - name: Move sources to sdk folder
        run: |
          mv ${{ env.PACKAGE_NAME }} /builder/package/${{ env.PACKAGE_NAME }}

      - name: Install Golang
        run: |
          # Add golang-backports repository
          echo "deb https://deb.debian.org/debian bookworm-backports main" > /etc/apt/sources.list.d/backports.list
          apt-get update
          
          # Install Go from backports
          apt-get install -y -t bookworm-backports golang-go

      - name: Configure SDK
        run: |
          cd /builder

          # Generate default configuration
          make defconfig

          # Update configuration for our needs
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=y" >> .config
          
      - name: Compile Package
        run: |
          cd /builder
          env GOOS=linux \
          GOARCH=${{ matrix.target.goarch }} \
          GOMIPS=${{ matrix.target.gomips }} \
          GOARM=${{ matrix.target.goarm }} \
          make -j$(nproc) V=sc package/${{ env.PACKAGE_NAME }}/compile ${{ env.DEBUG == 'true' && 'V=sc' || '' }}

      - name: List output package(s)
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.ipk" -type f | grep -v nodogsplash | head -n1)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No .ipk package found in /builder/bin/packages"
            exit 1
          fi

          echo "✅ Found package at: $PACKAGE_PATH"
          
          # Extract filename for later use
          FILENAME=$(basename "$PACKAGE_PATH")
          echo "PACKAGE_FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "TARGET_ARCHITECTURE=${{ matrix.target.architecture }}" >> $GITHUB_ENV
          
          # Copy file to a location GitHub can access
          mkdir -p /github/workspace/artifacts/${{ matrix.target.architecture }}
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${{ matrix.target.architecture }}/$FILENAME"

      - name: GitHub Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ env.PACKAGE_NAME }}-${{ matrix.target.architecture }}
          path: /github/workspace/artifacts/${{ matrix.target.architecture }}
          retention-days: 5
  
  publish-metadata:
    needs: build-package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          # Original specific devices
          - id: "gl-mt3000"
            architecture: "aarch64_cortex-a53"
            name: "GL-MT3000"
            display_name: "GL.iNet GL-MT3000"
          - id: "gl-mt6000"
            architecture: "aarch64_cortex-a53" 
            name: "GL-MT6000"
            display_name: "GL.iNet GL-MT6000"
          - id: "covr-x1860-a1"
            architecture: "mipsel_24kc"
            name: "D-Link COVR-X1860 A1"
            display_name: "D-Link COVR-X1860 A1"
          # Generic architecture entries for other platforms
          - id: "x86_64"
            architecture: "x86_64"
            name: "x86_64"
            display_name: "Generic x86_64"
          - id: "mips_24kc"
            architecture: "mips_24kc"
            name: "mips_24kc"
            display_name: "Generic MIPS 24Kc"
          - id: "aarch64_cortex-a72"
            architecture: "aarch64_cortex-a72"
            name: "bcm2711"
            display_name: "Raspberry Pi 4"
          - id: "aarch64_generic"
            architecture: "aarch64_generic"
            name: "rockchip"
            display_name: "Generic ARM64"
          - id: "arm_cortex-a7_neon-vfpv4"
            architecture: "arm_cortex-a7_neon-vfpv4"
            name: "ipq40xx"
            display_name: "Qualcomm IPQ40xx"
          - id: "arm_cortex-a15_neon-vfpv4"
            architecture: "arm_cortex-a15_neon-vfpv4"
            name: "ipq806x"
            display_name: "Qualcomm IPQ806x"
          - id: "arm_cortex-a9"
            architecture: "arm_cortex-a9"
            name: "bcm53xx"
            display_name: "Broadcom BCM53xx"
    
    steps:
      - name: Download artifact for architecture
        uses: actions/download-artifact@v4
        with:
          name: package-${{ env.PACKAGE_NAME }}-${{ matrix.device.architecture }}
          path: ./artifacts
      
      - name: Prepare package metadata
        id: package_info
        run: |
          PACKAGE_PATH=$(find ./artifacts -name "*.ipk" -type f | head -n1)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "❌ No package found for architecture ${{ matrix.device.architecture }}"
            exit 1
          fi
          
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # Calculate file size
          FILE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> $GITHUB_ENV
          echo "PACKAGE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "ARCHITECTURE=${{ matrix.device.architecture }}" >> $GITHUB_ENV
          echo "DEVICE_ID=${{ matrix.device.id }}" >> $GITHUB_ENV
          echo "DEVICE_NAME=${{ matrix.device.display_name }}" >> $GITHUB_ENV

      - name: Blossom Artifact upload
        id: blossom_upload
        uses: Origami74/upload-blossom-action@improve-io
        with:
          host: "https://blossom.swissdash.site"
          filePath: ${{ env.PACKAGE_PATH }}
     
      - name: Process Blossom response and extract hash
        run: |
          echo "Upload outputs:"
          echo "  URL: ${{ steps.blossom_upload.outputs.url }}"
          echo "  Hash: ${{ steps.blossom_upload.outputs.hash }}"
          echo "  Size: ${{ env.PACKAGE_SIZE }} bytes"
          
          # Extract hash from URL
          URL="${{ steps.blossom_upload.outputs.url }}"
          
          # Use basename to extract filename from URL
          FILENAME=$(basename "$URL")
          
          # Remove the file extension to get the hash
          HASH="${FILENAME%.ipk}"
          
          echo "Extracted hash from URL: $HASH"
          
          # Store values in environment variables
          echo "PACKAGE_URL=$URL" >> $GITHUB_ENV
          echo "PACKAGE_HASH=$HASH" >> $GITHUB_ENV
          
          # Verify hash was extracted successfully
          if [ -z "$HASH" ]; then
            echo "❌ ERROR: Failed to extract hash from URL"
            exit 1
          fi
          
          # Verify hash is a valid hex string (64 characters for SHA-256)
          if ! [[ $HASH =~ ^[0-9a-f]{64}$ ]]; then
            echo "❌ ERROR: Extracted hash doesn't appear to be a valid SHA-256 hash"
            exit 1
          fi
          
          echo "✅ Successfully extracted hash: $HASH"

      # Extract Short Module Name before publishing NIP-94 metadata
      - name: Extract Short Module Name
        run: |
          # Extract the basic part from tollgate-module-basic-go
          if [[ "${{ env.PACKAGE_NAME }}" =~ tollgate-module-(.+)-go ]]; then
            SHORT_MODULE="${BASH_REMATCH[1]}"
          else
            SHORT_MODULE="$(echo "${{ env.PACKAGE_NAME }}" | sed 's/tollgate-module-//g' | sed 's/-go//g')"
          fi
          echo "SHORT_MODULE=$SHORT_MODULE" >> $GITHUB_ENV
          
          # Create a standardized filename for the package
          DEVICE="${{ env.DEVICE_ID }}"
          PACKAGE_SHORT_FILENAME="${SHORT_MODULE}-${DEVICE}-${{ env.ARCHITECTURE }}.ipk"
          echo "PACKAGE_SHORT_FILENAME=$PACKAGE_SHORT_FILENAME" >> $GITHUB_ENV
          
          # Create a simplified content format
          echo "PACKAGE_CONTENT=TollGate Module Package: ${SHORT_MODULE} for ${{ env.DEVICE_NAME }}" >> $GITHUB_ENV

      - name: Publish Package NIP-94 Metadata
        id: publish_package
        uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
        with:
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/
          url: ${{ env.PACKAGE_URL }}
          mimeType: application/octet-stream
          fileHash: ${{ env.PACKAGE_HASH }}
          originalHash: ${{ env.PACKAGE_HASH }}
          filename: "${{ env.PACKAGE_SHORT_FILENAME }}"
          content: "${{ env.PACKAGE_CONTENT }}"
          nsec: ${{ secrets.NSEC }}
          size: ${{ env.PACKAGE_SIZE }}
          architecture: "${{ env.ARCHITECTURE }}"
          device: "${{ env.DEVICE_ID }}"

      # Debug the outputs to see what's available
      - name: Debug Event ID
        run: |
          echo "EVENT_ID from env: ${{ env.EVENT_ID }}"
          echo "NOTE_ID from env: ${{ env.NOTE_ID }}"
          echo "Output from publish step: ${{ steps.publish_package.outputs.eventId || 'not set' }}"
          echo "Outputs available:"
          echo "${{ toJSON(steps.publish_package.outputs) }}"

      - name: Verify Package NIP-94 Event
        id: verify_package
        # Use environment variable instead of step output
        if: env.EVENT_ID != ''
        uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
        with:
          eventId: ${{ env.EVENT_ID }}
          relays: wss://relay.damus.io,wss://nos.lol,wss://nostr.mom/

      - name: Check Package Publication
        # Only run this step if the verification ran and failed
        if: steps.verify_package.outcome == 'failure'
        run: |
          echo "❌ Failed to verify package publication on relays"
          exit 1
          
      # Add a step to handle the case where EVENT_ID is empty
      - name: Check Event ID
        if: env.EVENT_ID == ''
        run: |
          echo "❌ No event ID was generated by the publish step"
          exit 1

      - name: Build Summary
        run: |
          echo "Build Summary for ${{ matrix.device.display_name }}:"
          echo "✅ Package successfully built and published"
          echo "Package URL: ${{ steps.blossom_upload.outputs.url }}"

  trigger-os-workflow:
    needs: publish-metadata
    runs-on: ubuntu-latest
    # Only trigger when all targets have been built and published
    if: ${{ always() && !contains(needs.*.result, 'failure') }}
    
    steps:
      - name: Trigger OS Workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: OpenTollGate/tollgate-os
          event-type: update-release-json

